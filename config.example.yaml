pools:
  - instance: instance_1
    id: pool_bench32_id
    name: pool_name
    key: config/pool_name.vrf.skey
    exclude: false
  - instance: instance_2
    id: pool_bench32_id
    name: pool_name
    key: config/pool_name.vrf.skey
    exclude: true
    allow-empty-slots: true
network: mainnet
block-watcher:
  enabled: true
  refresh-interval: 60
pool-watcher:
  enabled: true
  refresh-interval: 60
network-watcher:
  enabled: true
  refresh-interval: 60
status-watcher:
  refresh-interval: 15
database:
  path: watcher.db
blockfrost:
  project-id: "thisissecret"
  endpoint: https://cardano-mainnet.blockfrost.io/api/v0
  max-routines: 10
  timeout: 60
http:
  host: "0.0.0.0"
  port: 8080
cardano:
  config-dir: config/preprod
  timezone: UTC
  # cardano-node TCP endpoints (host:port bridges in front of a node, e.g. socat
  # exposing the node's Unix socket). The watcher proxies cardano-cli to these
  # and fails over between them when one is unreachable. List one or several.
  # Point them at relays on a trusted/private network, not at the block producer.
  nodes:
    - host: cardano-node-primary
      port: 3002
    - host: cardano-node-secondary
      port: 3002