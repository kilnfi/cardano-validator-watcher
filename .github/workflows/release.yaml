name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: cardano-validator-watcher
  BINARY_NAME: cardano-validator-watcher
  CHART_NAME: cardano-validator-watcher
  CHART_DIRECTORY: charts
  REGISTRY: oci://ghcr.io/kilnfi/charts

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: fixed-egress-4c-16g
            os_name: linux
            arch: amd64
          - runner: fixed-egress-4c-16g
            os_name: linux
            arch: arm64
          - runner: macos-latest
            os_name: darwin
            arch: amd64
          - runner: macos-latest
            os_name: darwin
            arch: arm64

    runs-on: ${{ matrix.runner }}

    env:
      ARCH_NAME: ${{ matrix.arch }}
      OS_NAME: ${{ matrix.os_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          if [ "$OS_NAME" = "linux" ]; then
            sudo apt-get update
            if [ "$ARCH_NAME" = "amd64" ]; then
              sudo apt-get install -y build-essential
            elif [ "$ARCH_NAME" = "arm64" ]; then
              sudo apt-get install -y build-essential gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            fi
          elif [ "$OS_NAME" = "darwin" ]; then
            brew update
            brew install sqlite
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build ${{ matrix.os_name }}-${{ matrix.arch }} binary
        id: build
        shell: bash
        run: |
          set -euo pipefail

          OUTPUT_NAME="${{ env.BINARY_NAME }}_${{ github.ref_name }}_${OS_NAME}_${ARCH_NAME}"
          OUTPUT_DIR="dist/${OUTPUT_NAME}"
          ARCHIVE_NAME="${OUTPUT_NAME}.tar.gz"
          ARCHIVE_PATH="${OUTPUT_DIR}/${ARCHIVE_NAME}"

          echo "output_dir=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
          echo "archive_path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"

          mkdir -p "${OUTPUT_DIR}"

          if [ "$OS_NAME" = "linux" ] && [ "$ARCH_NAME" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi

          CGO_ENABLED=1 GOOS="$OS_NAME" GOARCH="$ARCH_NAME" \
            go build -ldflags="-s -w" -o "${OUTPUT_DIR}/${{ env.BINARY_NAME }}" cmd/watcher/main.go

          tar -czvf "${ARCHIVE_PATH}" -C "${OUTPUT_DIR}" "${{ env.BINARY_NAME }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os_name }}-${{ matrix.arch }}
          path: ${{ steps.build.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 1

  release_binaries:
    name: Upload binaries to GitHub Release
    needs: binaries
    runs-on: fixed-egress-4c-16g
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: true

      - name: Show downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f -name "*.tar.gz" -print

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: "dist/*.tar.gz"
          tag: ${{ github.ref_name }}
          file_glob: true
          overwrite: true

  images:
    needs: binaries
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    runs-on: fixed-egress-4c-16g
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Container Images
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          labels: |-
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.name=${{ env.IMAGE_NAME }}
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.authors=contact@kiln.fi
          platforms: linux/${{ matrix.arch }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |-
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ matrix.arch }}

      - name: Export digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-linux-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: fixed-egress-4c-16g
    needs:
      - images
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        working-directory: /tmp/digests
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${REGISTRY_IMAGE}:latest" \
            -t "${REGISTRY_IMAGE}:${{ github.ref_name }}" \
            $(printf "${REGISTRY_IMAGE}:${{ github.ref_name }}-%s " amd64 arm64)
        env:
          REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}

      - name: Inspect image
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:latest"
          docker buildx imagetools inspect "${REGISTRY_IMAGE}:${{ github.ref_name }}"
        env:
          REGISTRY_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
